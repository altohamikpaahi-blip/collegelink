<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إنشاء خطاب جديد</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-850">
    <header class="bg-blue-950 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold">إنشاء خطاب إلكتروني جديد</h1>
        <a href="{% url 'dashboard' %}" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-1.5 rounded text-sm font-bold">رجوع للوحة المراسلات</a>
    </header>

    <main class="max-w-3xl mx-auto p-6 mt-6">
        <div class="bg-white p-8 rounded-lg shadow-md">
            <!-- تنبيه مهم جداً: تأكد من كتابة enctype لمنع أخطاء رفع الملفات -->
            <form method="post" enctype="multipart/form-data" class="space-y-6">
                {% csrf_token %}
                
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">إلى كلية:</label>
                    {{ form.recipient_college }}
                </div>

                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">موضوع الخطاب / العنوان:</label>
                    {{ form.title }}
                </div>

                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">نص الخطاب:</label>
                    {{ form.content }}
                </div>

                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">المرفقات (صورة أو ملف PDF):</label>
                    <input type="file" name="attachment" class="w-full px-3 py-2 border rounded-md text-sm focus:outline-none">
                </div>

                <div class="flex items-center gap-4 pt-4 border-t">
                    <!-- زر الإرسال المباشر -->
                    <button type="submit" name="send" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2.5 rounded-md font-bold text-sm shadow">
                        اعتماد وإرسال فوراً
                    </button>
                    <!-- زر الحفظ كمسودة للمراجعة لاحقاً -->
                    <button type="submit" name="draft" class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-2.5 rounded-md font-bold text-sm shadow">
                        حفظ كمسودة
                    </button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
